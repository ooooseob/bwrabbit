spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gweb2
    username: gweb2
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080

ollama:
  base-url: http://localhost:11434
  llm-model: gemma4:e2b
  embed-model: bge-m3

python:
  api-url: http://localhost:8000

logging:
  level:
    com.gweb2: DEBUG
    org.flywaydb: INFO
